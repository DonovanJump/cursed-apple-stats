version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: cursed-apple-stats-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cursed_apple_stats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql

volumes:
  pg_data:
